 Living Council is linked here which has the contact information for all 12 centers and the areas they serve. Centers can be contacted directly for more information about their respective services.","voiceCode":"en-US-AvaNeural","language":"en","originalResourceId":"kBxCj6yoQavoyWG5T","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-AvaNeural\">Ohio has 12 Centers for Independent Living that provide essential services to assist individuals with disabilities in living independently within their communities. Including Independent Living Skills Training, Peer Support, Advocacy, and Transition Services. Many centers offer extra services to help people reach their goals for living more independently in their community and they help people of all ages who have any kind of disability.\u003cbreak time=\"0.5s\"/>The website for the Ohio Statewide Independent Living Council is linked here which has the contact information for all 12 centers and the areas they serve. Centers can be contacted directly for more information about their respective services.\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"Ohio has 12 centers for independent living that provide essential services","startTime":0.159,"finishTime":4.639},{"text":"to assist individuals with disabilities in","startTime":4.639,"finishTime":7.199},{"text":"living independently within their communities,","startTime":7.199,"finishTime":9.59},{"text":"including independent living skills training,","startTime":10.02,"finishTime":12.17},{"text":"peer support,","startTime":12.279,"finishTime":13.17},{"text":"advocacy,","startTime":13.359,"finishTime":14.149},{"text":"and transition services.","startTime":14.22,"finishTime":1
